---
name: ci-build-test

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:
  resolve-versions:
    name: resolve go versions
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      GO_MINOR_VERSION_PROJECT: ${{ steps.versions.outputs.GO_MINOR_VERSION_PROJECT }}
      GO_MINOR_VERSION_STABLE: ${{ steps.versions.outputs.GO_MINOR_VERSION_STABLE }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve Go versions
        id: versions
        uses: carabiner-dev/actions/go/versions@e0e3b8149dafed833431095bc148d50e7eade4e8

  build-matrix:
    name: build (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    needs: resolve-versions

    permissions:
      contents: read

    strategy:
      matrix:
        go-version:
          - ${{ needs.resolve-versions.outputs.GO_MINOR_VERSION_PROJECT }}
          - ${{ needs.resolve-versions.outputs.GO_MINOR_VERSION_STABLE }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache: false

      - name: build
        run: make pkg

  test-matrix:
    name: test (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    needs: resolve-versions

    permissions:
      contents: read

    strategy:
      matrix:
        go-version:
          - ${{ needs.resolve-versions.outputs.GO_MINOR_VERSION_PROJECT }}
          - ${{ needs.resolve-versions.outputs.GO_MINOR_VERSION_STABLE }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache: false

      - name: test
        run: make test-cover

  # Summary jobs with stable names for branch protection rules.
  # The matrix jobs above have dynamic names (e.g. "build (1.25)") which
  # change as Go versions are released, so branch protection gates on these
  # fixed names instead.
  build:
    name: build
    runs-on: ubuntu-latest
    needs: build-matrix
    if: always()
    steps:
      - run: |
          if [ "${{ needs.build-matrix.result }}" != "success" ]; then
            echo "build matrix failed"
            exit 1
          fi

  test:
    name: test
    runs-on: ubuntu-latest
    needs: test-matrix
    if: always()
    steps:
      - run: |
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then
            echo "test matrix failed"
            exit 1
          fi
